<html lang="es">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador Inventario 2026 - EYG Energy Group</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a3a5c 0%, #2563a8 100%);
    color: white;
    padding: 26px 32px 22px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.85rem; font-weight: 700; letter-spacing: 0.4px; }
  header p  { font-size: 0.93rem; opacity: 0.82; margin-top: 4px; }
  header .updated { font-size: 0.78rem; opacity: 0.62; margin-top: 6px; }

  .stats-bar {
    display: flex; flex-wrap: wrap; gap: 14px;
    padding: 18px 32px;
    background: white;
    border-bottom: 1px solid #e2e8f0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }
  .stat-card {
    background: #f8fafc; border: 1px solid #e2e8f0;
    border-radius: 10px; padding: 11px 18px;
    text-align: center; min-width: 140px; flex: 1;
  }
  .stat-card .val { font-size: 1.55rem; font-weight: 700; color: #1a3a5c; }
  .stat-card .lbl { font-size: 0.72rem; color: #64748b; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.4px; }
  .stat-card.green .val { color: #15803d; }
  .stat-card.red   .val { color: #b91c1c; }
  .stat-card.blue  .val { color: #1d4ed8; font-size: 1.1rem; }

  .controls {
    padding: 16px 32px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    background: #f0f4f8;
  }
  .search-box {
    display: flex; align-items: center;
    background: white; border: 2px solid #cbd5e1;
    border-radius: 10px; padding: 8px 14px;
    flex: 1; min-width: 240px; transition: border-color 0.2s;
  }
  .search-box:focus-within { border-color: #2563a8; }
  .search-box span { font-size: 1.05rem; margin-right: 8px; color: #94a3b8; }
  .search-box input {
    border: none; outline: none; font-size: 0.95rem;
    width: 100%; color: #1e293b; background: transparent;
  }

  .filter-section { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .filter-label { font-size: 0.78rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }

  .filter-btn {
    padding: 7px 15px;
    border: 2px solid #cbd5e1; border-radius: 8px;
    background: white; cursor: pointer;
    font-size: 0.84rem; font-weight: 600; color: #475569;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #2563a8; color: #2563a8; }
  .filter-btn.active { background: #2563a8; color: white; border-color: #2563a8; }
  .filter-btn.active.mecanico    { background: #0f766e; border-color: #0f766e; }
  .filter-btn.active.electrico   { background: #b45309; border-color: #b45309; }
  .filter-btn.active.instrumento { background: #7c3aed; border-color: #7c3aed; }
  .filter-btn.active.varios      { background: #475569; border-color: #475569; }

  .divider { width: 1px; background: #cbd5e1; height: 32px; align-self: center; margin: 0 4px; }

  .result-count {
    padding: 7px 32px; font-size: 0.82rem; color: #64748b; background: #f0f4f8;
  }

  .content-area { padding: 0 32px 32px; }

  /* Family group */
  .family-group { margin-bottom: 18px; }
  .family-header {
    display: flex; align-items: center; gap: 12px;
    background: white; border: 1px solid #e2e8f0;
    border-radius: 10px 10px 0 0; padding: 10px 16px;
    cursor: pointer; user-select: none;
    transition: background 0.15s;
  }
  .family-header:hover { background: #f8fafc; }
  .family-header.collapsed { border-radius: 10px; }
  .family-title { font-size: 0.95rem; font-weight: 700; color: #1a3a5c; flex: 1; }
  .family-meta { display: flex; gap: 8px; align-items: center; }
  .cat-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 700;
  }
  .cat-mecanico    { background: #ccfbf1; color: #0f766e; }
  .cat-electrico   { background: #fef3c7; color: #b45309; }
  .cat-instrumentacion { background: #ede9fe; color: #7c3aed; }
  .cat-varios      { background: #f1f5f9; color: #475569; }

  .family-count { font-size: 0.78rem; color: #94a3b8; }
  .toggle-icon { font-size: 0.9rem; color: #94a3b8; transition: transform 0.2s; }
  .family-header.collapsed .toggle-icon { transform: rotate(-90deg); }

  .table-wrapper {
    background: white; border: 1px solid #e2e8f0;
    border-top: none; border-radius: 0 0 10px 10px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead tr {
    background: #1e40af; color: white;
    position: sticky; top: 0; z-index: 5;
  }
  thead th {
    padding: 10px 13px; text-align: left;
    font-weight: 600; letter-spacing: 0.2px; white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.1s; }
  tbody tr:hover { background: #f8fafc; }
  tbody td { padding: 9px 13px; color: #334155; vertical-align: middle; }

  .stock-badge {
    display: inline-block; padding: 3px 10px;
    border-radius: 20px; font-weight: 700; font-size: 0.82rem;
    min-width: 38px; text-align: center;
  }
  .stock-green { background: #dcfce7; color: #15803d; }
  .stock-red   { background: #fee2e2; color: #b91c1c; }

  mark { background: #fef08a; padding: 0 2px; border-radius: 2px; }

  .empty-state {
    text-align: center; padding: 50px 20px;
    color: #94a3b8; font-size: 0.95rem;
    background: white; border: 1px solid #e2e8f0;
    border-radius: 10px; margin-top: 8px;
  }
  .empty-state .icon { font-size: 2.2rem; margin-bottom: 10px; }

  @media (max-width: 768px) {
    .content-area { padding: 0 10px 20px; }
    .controls { padding: 12px 10px; }
    .stats-bar { padding: 12px 10px; }
    header { padding: 16px 14px; }
    .result-count { padding: 6px 10px; }
  }
</style>

// Build family order
const FAMILY_ORDER = [
  "Instrumentación Especial",
  "Platinas de Orificio",
  "Fittings OD / Swagelok",
  "Fittings Roscados",
  "Fittings Soldables / BW",
  "Tuberías",
  "Flanches",
  "Válvulas",
  "Niples",
  "Espárragos",
  "Tuercas y Pernería",
  "Espirometálicos / Juntas",
  "Material Eléctrico",
  "Herramientas / Varios",
  "Otros"
];

const CAT_LABELS = {
  mecanico:        '⚙️ Mecánico',
  electrico:       '⚡ Eléctrico',
  instrumentacion: '🎛️ Instrumentación',
  varios:          '📦 Varios'
};

let stockFilter = 'all';
let catFilter   = 'all';
let collapseState = {};

function highlight(text, query) {
  if (!query) return String(text);
  const esc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return String(text).replace(new RegExp('(' + esc + ')', 'gi'), '<mark>$1</mark>');
}

function fmt(num) {
  if (!num && num !== 0) return '-';
  const n = Number(num);
  if (n === 0) return '-';
  return '$' + n.toLocaleString('es-CO', {minimumFractionDigits: 0, maximumFractionDigits: 0});
}

function setStockFilter(type, btn) {
  stockFilter = type;
  document.querySelectorAll('[data-stock]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function setCatFilter(type, btn) {
  catFilter = type;
  document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active','mecanico','electrico','instrumento','varios'));
  btn.classList.add('active');
  if (type !== 'all') btn.classList.add(type === 'instrumentacion' ? 'instrumento' : type);
  applyFilters();
}

function toggleFamily(familyId) {
  collapseState[familyId] = !collapseState[familyId];
  const header = document.getElementById('fh-' + familyId);
  const body   = document.getElementById('fb-' + familyId);
  if (collapseState[familyId]) {
    header.classList.add('collapsed');
    body.style.display = 'none';
  } else {
    header.classList.remove('collapsed');
    body.style.display = '';
  }
}

function applyFilters() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const area  = document.getElementById('contentArea');
  const countEl = document.getElementById('resultCount');

  // Filter data
  let filtered = DATA.filter(r => {
    if (stockFilter === 'stock' && Number(r['STOCK ACTUAL']) <= 0) return false;
    if (stockFilter === 'out'   && Number(r['STOCK ACTUAL']) >  0) return false;
    if (catFilter !== 'all' && r['CATEGORIA'] !== catFilter) return false;
    if (query) {
      const haystack = [r['DESCRIPCION'], r['CODIGO PRODUCTO'], r['PROVEEDOR'], r['MARCA']]
        .map(v => String(v).toLowerCase()).join(' ');
      if (!haystack.includes(query)) return false;
    }
    return true;
  });

  // Group by family
  const groups = {};
  for (const r of filtered) {
    const fam = r['FAMILIA'] || 'Otros';
    if (!groups[fam]) groups[fam] = [];
    groups[fam].push(r);
  }

  if (filtered.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="icon">🔎</div><div>No se encontraron productos con ese criterio.</div></div>`;
    countEl.textContent = 'Sin resultados';
    return;
  }

  countEl.textContent = `Mostrando ${filtered.length} de 274 productos`;

  // Sort families
  const sortedFamilies = FAMILY_ORDER.filter(f => groups[f]);
  const remaining = Object.keys(groups).filter(f => !FAMILY_ORDER.includes(f));
  const allFamilies = [...sortedFamilies, ...remaining];

  area.innerHTML = allFamilies.map(fam => {
    const items = groups[fam];
    const cat   = items[0]['CATEGORIA'];
    const famId = fam.replace(/[^a-zA-Z0-9]/g, '_');
    const isCollapsed = collapseState[famId] || false;

    const rows = items.map(r => {
      const stock = Number(r['STOCK ACTUAL']);
      const badge = stock > 0
        ? `<span class="stock-badge stock-green">${stock}</span>`
        : `<span class="stock-badge stock-red">0</span>`;
      const hl = v => highlight(v, query);
      return `<tr>
        <td><strong>${hl(r['CODIGO PRODUCTO'])}</strong></td>
        <td>${hl(r['DESCRIPCION'])}</td>
        <td>${hl(r['MARCA'])}</td>
        <td>${badge}</td>
        <td>${r['UBICACIÓN'] || '-'}</td>
        <td>${fmt(r['COSTO COMPRA'])}</td>
        <td>${r['PRECIO VENTA'] && Number(r['PRECIO VENTA']) > 0 ? fmt(r['PRECIO VENTA']) : '-'}</td>
        <td>${hl(r['PROVEEDOR'])}</td>
      </tr>`;
    }).join('');

    return `
    <div class="family-group">
      <div class="family-header ${isCollapsed ? 'collapsed' : ''}" id="fh-${famId}" onclick="toggleFamily('${famId}')">
        <span class="family-title">📁 ${fam}</span>
        <div class="family-meta">
          <span class="cat-badge cat-${cat}">${CAT_LABELS[cat] || cat}</span>
          <span class="family-count">${items.length} ítem${items.length !== 1 ? 's' : ''}</span>
        </div>
        <span class="toggle-icon">▼</span>
      </div>
      <div class="table-wrapper" id="fb-${famId}" style="${isCollapsed ? 'display:none' : ''}">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Descripción</th>
              <th>Marca</th>
              <th>Stock</th>
              <th>Ubicación</th>
              <th>Costo Compra</th>
              <th>Precio Venta</th>
              <th>Proveedor</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

// Initial render
applyFilters();
</script>
