name: 📋 Reporte Diario de Órdenes de Compra

on:
  schedule:
    # Lunes a Viernes a las 5:00 PM Colombia (UTC-5 = 22:00 UTC)
    - cron: '0 22 * * 1-5'

  # Permite ejecutar manualmente desde GitHub para pruebas
  workflow_dispatch:
    inputs:
      test_run:
        description: 'Ejecutar en modo prueba'
        required: false
        default: 'false'

jobs:
  send-oc-report:
    runs-on: ubuntu-latest
    name: 📧 Enviar reporte de OC

    steps:
      - name: 📥 Descargar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📋 Generar y enviar reporte OC
        env:
          MS_TENANT_ID:      ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID:      ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET:  ${{ secrets.MS_CLIENT_SECRET }}
          SENDER_EMAIL:      ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAILS:  ${{ secrets.RECIPIENT_EMAILS }}
        run: python scripts/oc_report.py

      - name: ✅ Confirmar envío
        run: echo "Reporte OC enviado exitosamente — $(date +'%Y-%m-%d %H:%M UTC')"
