name: ⚠️ Alertas de Stock Crítico

on:
  schedule:
    # 9:00 AM Colombia (14:00 UTC) y 2:00 PM Colombia (19:00 UTC) — L-V
    - cron: '0 14 * * 1-5'
    - cron: '0 19 * * 1-5'
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest
    name: 📧 Verificar stock crítico

    steps:
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ⚠️ Revisar productos y notificar
        env:
          MS_TENANT_ID:     ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID:     ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          SENDER_EMAIL:     ${{ secrets.SENDER_EMAIL }}
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
        run: |
          python - <<'EOF'
          import json, urllib.request, urllib.parse, os, sys
          from datetime import datetime, timezone, timedelta

          supa_url = os.environ.get('SUPABASE_URL','').strip()
          supa_key = os.environ.get('SUPABASE_KEY','').strip()
          if not supa_url or not supa_key:
              print('SUPABASE_URL/KEY no configurados'); sys.exit(0)

          hdrs = {'apikey': supa_key, 'Authorization': 'Bearer ' + supa_key}

          # 1. Consultar productos con stock entre 1 y 4 (crítico)
          req = urllib.request.Request(
              supa_url + '/rest/v1/productos'
              '?stock_actual=gte.1&stock_actual=lt.5'
              '&activo=eq.true&order=stock_actual.asc'
              '&select=codigo,descripcion,stock_actual,ubicacion,proveedor',
              headers=hdrs)
          with urllib.request.urlopen(req) as r:
              criticos = json.loads(r.read())

          if not criticos:
              print('Sin productos con stock crítico'); sys.exit(0)

          print(f'{len(criticos)} producto(s) con stock crítico')

          # 2. Token Microsoft
          tenant_id     = os.environ['MS_TENANT_ID'].strip()
          client_id     = os.environ['MS_CLIENT_ID'].strip()
          client_secret = os.environ['MS_CLIENT_SECRET'].strip()
          sender        = os.environ['SENDER_EMAIL'].strip()
          recipients    = ['gerenciageneral@eygenergygroup.com',
                           'andrea.bernal@eygenergygroup.com']

          data = urllib.parse.urlencode({
              'grant_type': 'client_credentials', 'client_id': client_id,
              'client_secret': client_secret,
              'scope': 'https://graph.microsoft.com/.default'
          }).encode()
          req2 = urllib.request.Request(
              f'https://login.microsoftonline.com/{tenant_id}/oauth2/v2.0/token',
              data=data, method='POST')
          with urllib.request.urlopen(req2) as r:
              token = json.loads(r.read())['access_token']

          # 3. Construir correo
          co_tz  = timezone(timedelta(hours=-5))
          ahora  = datetime.now(co_tz)
          hora   = ahora.strftime('%H:%M')
          turno  = 'Mañana' if ahora.hour < 13 else 'Tarde'

          filas = ''
          for p in criticos:
              stock = p.get('stock_actual', 0)
              color = '#c0392b' if stock <= 2 else '#b7770d'
              bg    = '#fce8e6' if stock <= 2 else '#fff8e1'
              filas += (
                  f"<tr>"
                  f"<td style='font-family:monospace;font-size:11px;padding:8px 10px;"
                  f"border-bottom:1px solid #eef1f8;color:#555;'>{p.get('codigo','')}</td>"
                  f"<td style='font-size:13px;padding:8px 10px;border-bottom:1px solid #eef1f8;"
                  f"font-weight:600;'>{p.get('descripcion','')}</td>"
                  f"<td style='text-align:center;padding:8px 10px;border-bottom:1px solid #eef1f8;'>"
                  f"<span style='background:{bg};color:{color};padding:3px 12px;"
                  f"border-radius:10px;font-weight:700;font-size:14px;'>{stock}</span></td>"
                  f"<td style='font-size:11px;padding:8px 10px;border-bottom:1px solid #eef1f8;"
                  f"color:#666;'>{p.get('proveedor','—')}</td>"
                  f"<td style='font-size:11px;padding:8px 10px;border-bottom:1px solid #eef1f8;"
                  f"color:#888;'>{p.get('ubicacion','—')}</td>"
                  f"</tr>"
              )

          html = f"""<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body style="font-family:'Segoe UI',Arial,sans-serif;background:#f0f4ff;margin:0;padding:16px;">
<div style="max-width:700px;margin:0 auto;background:#fff;border-radius:14px;
     overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1);">
  <div style="background:#b91c1c;padding:20px 24px;display:flex;align-items:center;gap:14px;">
    <span style="font-size:36px;">⚠️</span>
    <div>
      <div style="font-size:18px;font-weight:900;color:#fff;font-family:Montserrat,Arial,sans-serif;">
        Stock Crítico — {turno} · {hora} Colombia</div>
      <div style="font-size:12px;color:#fca5a5;margin-top:3px;">
        E&amp;G Energy Group · {len(criticos)} producto(s) requieren reabastecimiento</div>
    </div>
  </div>
  <div style="height:3px;background:linear-gradient(90deg,#E8A020,transparent);"></div>
  <div style="padding:24px;">
    <p style="color:#555;font-size:14px;margin:0 0 16px;">
      Los siguientes productos tienen <strong style="color:#b91c1c;">menos de 5 unidades</strong>.
      Por favor verificar disponibilidad con proveedores:
    </p>
    <table width="100%" cellpadding="0" cellspacing="0"
           style="border-collapse:collapse;font-size:13px;margin-bottom:20px;">
      <thead>
        <tr style="background:#0F2B5B;">
          <th style="color:#fff;padding:9px 10px;text-align:left;font-size:10px;
              text-transform:uppercase;letter-spacing:.5px;">Código</th>
          <th style="color:#fff;padding:9px 10px;text-align:left;font-size:10px;
              text-transform:uppercase;letter-spacing:.5px;">Producto</th>
          <th style="color:#fff;padding:9px 10px;text-align:center;font-size:10px;
              text-transform:uppercase;letter-spacing:.5px;">Stock</th>
          <th style="color:#fff;padding:9px 10px;text-align:left;font-size:10px;
              text-transform:uppercase;letter-spacing:.5px;">Proveedor</th>
          <th style="color:#fff;padding:9px 10px;text-align:left;font-size:10px;
              text-transform:uppercase;letter-spacing:.5px;">Ubicación</th>
        </tr>
      </thead>
      <tbody>{filas}</tbody>
    </table>
    <div style="background:#fff8e1;border-left:4px solid #E8A020;border-radius:8px;
         padding:12px 16px;font-size:13px;color:#7d5a00;">
      💡 <strong>Acción sugerida:</strong> Verificar disponibilidad con proveedores
      y programar orden de compra antes de que llegue a 0.
    </div>
  </div>
  <div style="background:#071525;padding:14px;text-align:center;">
    <p style="margin:0;font-size:11px;color:#8899bb;">
      ⚡ <strong style="color:#E8A020;">ENERGY — Asistente Administrativo</strong>
      · Alerta automática 9AM y 2PM · L–V</p>
  </div>
</div>
</body></html>"""

          payload = json.dumps({
              'message': {
                  'subject': (f'⚠️ Stock Crítico {turno} — {len(criticos)} producto(s) '
                              f'bajo umbral · {hora} Colombia'),
                  'body': {'contentType': 'HTML', 'content': html},
                  'toRecipients': [{'emailAddress': {'address': r}} for r in recipients]
              },
              'saveToSentItems': True
          }).encode('utf-8')

          req3 = urllib.request.Request(
              f'https://graph.microsoft.com/v1.0/users/{sender}/sendMail',
              data=payload, method='POST',
              headers={'Authorization': f'Bearer {token}',
                       'Content-Type': 'application/json'})
          with urllib.request.urlopen(req3) as r:
              print(f'Correo enviado a: {", ".join(recipients)}')
          EOF
