name: 🗓️ Recordatorio Sábado

on:
  schedule:
    # Viernes 4:00 PM Colombia (21:00 UTC)
    - cron: '0 21 * * 5'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    name: 📧 Recordar quién trabaja el sábado

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🗓️ Revisar sábado y notificar
        env:
          MS_TENANT_ID:     ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID:     ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          SENDER_EMAIL:     ${{ secrets.SENDER_EMAIL }}
        run: |
          python - <<'EOF'
          import json, os, sys, urllib.request, urllib.parse
          from datetime import datetime, timezone, timedelta

          co = timezone(timedelta(hours=-5))
          hoy = datetime.now(co).date()
          # Próximo sábado (mañana si corre el viernes; sirve también en ejecución manual)
          d = hoy + timedelta(days=1)
          while d.weekday() != 5:
              d += timedelta(days=1)
          ds = d.isoformat()
          fecha_txt = d.strftime('%d/%m/%Y')

          try:
              with open('data/sabados_plan.json', encoding='utf-8') as f:
                  plan = json.load(f)
          except Exception as e:
              print('No se pudo leer sabados_plan.json:', e); sys.exit(0)

          reg = next((r for r in plan if r.get('fecha') == ds), None)

          EMAILS = {
              'alexandra': ('Alexandra',       'asistente.administrativo@eygenergygroup.com'),
              'lina':      ('Lina Cifuentes',  'auxiliarcontableadministrativo@eygenergygroup.com'),
              'sandra':    ('Sandra',          'asistente.comercial@eygenergygroup.com'),
          }
          DIRECCION = ['gerenciageneral@eygenergygroup.com',
                       'andrea.bernal@eygenergygroup.com',
                       'director.comercial@eygenergygroup.com']

          if reg and reg.get('estado') == 'No laboral':
              print(f'Sábado {ds} marcado No laboral — no se envía recordatorio.'); sys.exit(0)

          if reg:
              efectiva = reg.get('reemplazo') if (reg.get('estado') == 'Cambiada' and reg.get('reemplazo')) else reg.get('asistente')
              nombre, correo = EMAILS.get(efectiva, (efectiva or '—', None))
              to  = ([correo] if correo else []) + DIRECCION
              subject = f'🗓️ Recordatorio: este sábado {fecha_txt} trabaja {nombre.split(" ")[0]}'
              detalle = f'<strong style="font-size:18px;color:#E8A020;">{nombre}</strong>'
              if reg.get('estado') == 'Cambiada' and reg.get('reemplazo'):
                  orig = EMAILS.get(reg.get('asistente'), (reg.get('asistente'),''))[0]
                  detalle += f'<br><span style="font-size:13px;color:#8899bb;">Cubre el turno de {orig}</span>'
              if reg.get('nota'):
                  detalle += f'<br><span style="font-size:12px;color:#8899bb;">Nota: {reg["nota"]}</span>'
              intro = 'Recordatorio de la rotación de sábados — mañana le corresponde a:'
          else:
              to  = DIRECCION
              subject = f'⚠️ Sábado {fecha_txt} SIN ASIGNAR en el cronograma'
              detalle = '<strong style="font-size:16px;color:#c0392b;">Nadie está asignado para mañana</strong>'
              intro = ('El cronograma de sábados no tiene asistente asignada para mañana. '
                       'Entra a la plataforma → Visitas Comerciales → 🗓️ Sábados y usa "Generar rotación".')

          html = f"""<!DOCTYPE html>
          <html><head><meta charset="UTF-8"></head>
          <body style="font-family:'Segoe UI',Arial,sans-serif;background:#f0f4ff;margin:0;padding:16px;">
          <div style="max-width:560px;margin:0 auto;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1);">
            <div style="background:#0F2B5B;padding:20px 24px;display:flex;align-items:center;gap:14px;">
              <span style="font-size:34px;">🗓️</span>
              <div>
                <div style="font-size:17px;font-weight:900;color:#fff;font-family:Montserrat,Arial,sans-serif;">Sábado {fecha_txt}</div>
                <div style="font-size:12px;color:#8899bb;margin-top:3px;">E&amp;G Energy Group · Rotación de asistentes</div>
              </div>
            </div>
            <div style="height:3px;background:linear-gradient(90deg,#E8A020,transparent);"></div>
            <div style="padding:26px 24px;">
              <p style="color:#555;font-size:14px;margin:0 0 14px;">{intro}</p>
              <div style="background:#f6f8ff;border-left:4px solid #E8A020;border-radius:8px;padding:16px 18px;">{detalle}</div>
            </div>
            <div style="background:#071525;padding:14px;text-align:center;">
              <p style="margin:0;font-size:11px;color:#8899bb;">⚡ <strong style="color:#E8A020;">ENERGY — Asistente Administrativo</strong> · Recordatorio automático viernes 4PM</p>
            </div>
          </div>
          </body></html>"""

          tenant_id     = os.environ['MS_TENANT_ID'].strip()
          client_id     = os.environ['MS_CLIENT_ID'].strip()
          client_secret = os.environ['MS_CLIENT_SECRET'].strip()
          sender        = os.environ['SENDER_EMAIL'].strip()

          data = urllib.parse.urlencode({
              'grant_type': 'client_credentials', 'client_id': client_id,
              'client_secret': client_secret,
              'scope': 'https://graph.microsoft.com/.default'
          }).encode()
          req = urllib.request.Request(
              f'https://login.microsoftonline.com/{tenant_id}/oauth2/v2.0/token',
              data=data, method='POST')
          with urllib.request.urlopen(req) as r:
              token = json.loads(r.read())['access_token']

          payload = json.dumps({
              'message': {
                  'subject': subject,
                  'body': {'contentType': 'HTML', 'content': html},
                  'toRecipients': [{'emailAddress': {'address': x}} for x in to]
              },
              'saveToSentItems': True
          }).encode('utf-8')

          req2 = urllib.request.Request(
              f'https://graph.microsoft.com/v1.0/users/{sender}/sendMail',
              data=payload, method='POST',
              headers={'Authorization': f'Bearer {token}',
                       'Content-Type': 'application/json'})
          with urllib.request.urlopen(req2) as r:
              print('Correo enviado a:', ', '.join(to))
          EOF
