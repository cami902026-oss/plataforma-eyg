name: 📋 Reporte Diario de Órdenes de Pedido

on:
  schedule:
    # Lunes a Viernes a las 3:00 PM Colombia aprox. (UTC-5 = 18:00 UTC, +2hr delay GitHub)
    - cron: '0 18 * * 1-5'

  # Permite ejecutar manualmente desde GitHub para pruebas
  workflow_dispatch:
    inputs:
      test_run:
        description: 'Ejecutar en modo prueba'
        required: false
        default: 'false'

jobs:
  send-op-report:
    runs-on: ubuntu-latest
    name: 📧 Enviar reporte de OP

    steps:
      - name: 📥 Descargar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📋 Generar y enviar reporte OP
        env:
          MS_TENANT_ID:      ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID:      ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET:  ${{ secrets.MS_CLIENT_SECRET }}
          SENDER_EMAIL:      ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAILS:  ${{ secrets.RECIPIENT_EMAILS }}
          EXTRA_RECIPIENTS:  "auxiliarcontableadministrativo@eygenergygroup.com"
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/op_report.py

      - name: ✅ Confirmar envío
        run: echo "Reporte OP enviado exitosamente — $(date +'%Y-%m-%d %H:%M UTC')"
