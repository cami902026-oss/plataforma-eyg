name: 📊 Informe Comercial Diario (5:13 PM)

on:
  schedule:
    # Lunes a Viernes a las 5:13 PM Colombia (UTC-5 = 22:13 UTC mismo día)
    # Hora adelantada + minuto "no en punto" para reducir el retraso de GitHub Actions
    - cron: '13 22 * * 1-5'

  # Permite ejecutar manualmente desde GitHub para pruebas
  workflow_dispatch:

jobs:
  send-business-report:
    runs-on: ubuntu-latest
    name: 📧 Enviar informe comercial a Andrea

    steps:
      - name: 📥 Descargar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install openpyxl

      - name: 📊 Generar y enviar informe
        env:
          MS_TENANT_ID:      ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID:      ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET:  ${{ secrets.MS_CLIENT_SECRET }}
          SENDER_EMAIL:      ${{ secrets.SENDER_EMAIL }}
          # Destinatarios: Andrea + Gerencia General
          RECIPIENT_EMAILS:  'andrea.bernal@eygenergygroup.com,gerenciageneral@eygenergygroup.com'
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
        run: python scripts/business_report.py

      - name: ✅ Confirmar envío
        run: echo "Informe comercial enviado — $(date +'%Y-%m-%d %H:%M UTC')"
